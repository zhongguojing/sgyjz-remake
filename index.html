<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>三国志英杰传 - 重制版 v0.3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #1a1a2e; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden; 
    }
    #game-container { 
      border: 2px solid #c9a84c; 
      border-radius: 4px; 
      box-shadow: 0 0 30px rgba(201,168,76,0.3); 
    }
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #loading-bar {
      width: 0%;
      height: 4px;
      background: #c9a84c;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div style="text-align: center;">
      <div style="color: #c9a84c; font-size: 24px; margin-bottom: 20px;">三国志英杰传 重制版</div>
      <div style="width: 200px; height: 4px; background: #333; margin: 0 auto;">
        <div id="loading-bar"></div>
      </div>
    </div>
  </div>
  
  <div id="game-container"></div>
  
  <script type="module" src="js/game.js"></script>
</body>
</html>
