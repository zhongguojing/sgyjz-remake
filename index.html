<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国志英杰传 - 重制版 v0.1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
      font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    }
    #game-container {
      border: 2px solid #c9a84c; border-radius: 4px;
      box-shadow: 0 0 30px rgba(201,168,76,0.3);
    }
    #loading-screen {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: #0d1b2a;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
    }
    #loading-screen h1 { color: #c9a84c; font-size: 36px; margin-bottom: 30px; letter-spacing: 4px; }
    #loading-bar-bg { width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    #loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg,#c9a84c,#f0d77b); transition: width 0.3s; }
    #loading-text { color: #888; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>三国志英杰传</h1>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <div id="loading-text">正在加载游戏...</div>
  </div>
  <div id="game-container"></div>

  <!-- Phaser 4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
  <!-- 游戏主逻辑（单文件，无需构建） -->
  <script src="game.js"></script>
</body>
</html>
